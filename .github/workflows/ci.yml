name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Format, Typecheck, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Build
        run: pnpm turbo run build

      - name: Test
        run: pnpm turbo run test
        env:
          NODE_ENV: test

      - name: Check coverage thresholds
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const packages = [
              'packages/shared',
              'packages/client',
              'relay/cloudflare',
            ];
            const thresholds = {
              'packages/shared': { lines: 90, branches: 85, functions: 90 },
              'packages/client': { lines: 80, branches: 75, functions: 80 },
              'relay/cloudflare': { lines: 75, branches: 70, functions: 75 },
            };

            let failed = false;
            for (const pkg of packages) {
              const summaryPath = pkg + '/coverage/coverage-summary.json';
              if (!fs.existsSync(summaryPath)) {
                console.log('No coverage for ' + pkg);
                continue;
              }
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf-8'));
              const total = summary.total;
              const thresh = thresholds[pkg];

              for (const [metric, min] of Object.entries(thresh)) {
                const actual = total[metric].pct;
                if (actual < min) {
                  console.error(pkg + ' ' + metric + ': ' + actual + '% < ' + min + '% threshold');
                  failed = true;
                } else {
                  console.log(pkg + ' ' + metric + ': ' + actual + '% >= ' + min + '%');
                }
              }
            }

            if (failed) process.exit(1);
          "

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            packages/shared/coverage/
            packages/client/coverage/
            relay/cloudflare/coverage/

  integration-tests:
    name: Integration Tests (relay)
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Setup local D1 database
        working-directory: relay/cloudflare
        run: |
          pnpm db:migrate:local
          pnpm db:seed:local

      - name: Start wrangler dev
        working-directory: relay/cloudflare
        run: pnpm dev &

      - name: Wait for dev server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8787/health | grep -q '"ok":true'; then
              echo "Dev server is up"
              exit 0
            fi
            sleep 2
          done
          echo "Dev server failed to start"
          exit 1

      - name: Run integration tests
        working-directory: relay/cloudflare
        run: pnpm test:integration

      - name: Stop wrangler
        if: always()
        run: kill %1 || true
